<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claudiometro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Claudiometro</h1>
      <div class="toolbar">
        <span id="status" class="status"></span>
        <label class="sched-field">
          <span>when</span>
          <input
            type="datetime-local"
            id="schedule-at"
            title="Empty = send now. Max 3 days in the future."
          />
        </label>
        <button id="refreshBtn">Refresh</button>
        <button id="pingBtn">Ping Haiku (start 5h)</button>
      </div>
    </header>

    <main>
      <section class="card" id="card-5h">
        <h2>5-hour window</h2>
        <div class="bar"><div class="bar-fill" id="fill-5h"></div></div>
        <div class="row">
          <span class="util" id="util-5h">--%</span>
          <span class="reset" id="reset-5h">resets --</span>
        </div>
      </section>

      <section class="card" id="card-weekly">
        <h2>Weekly window (7 days)</h2>
        <div class="bar"><div class="bar-fill" id="fill-weekly"></div></div>
        <div class="row">
          <span class="util" id="util-weekly">--%</span>
          <span class="reset" id="reset-weekly">resets --</span>
        </div>
      </section>

      <section class="card" id="card-extra" hidden>
        <h2>Extra credits</h2>
        <div class="bar"><div class="bar-fill" id="fill-extra"></div></div>
        <div class="row">
          <span class="util" id="util-extra">--%</span>
          <span class="reset" id="extra-detail"></span>
        </div>
      </section>

      <section class="card card-wide" id="card-daily">
        <h2>Daily haiku pings</h2>
        <ul class="daily-list" id="daily-list"></ul>
        <div class="row daily-row daily-add-row">
          <label class="daily-field">
            <span>at</span>
            <input type="time" id="daily-new-time" value="09:00" />
          </label>
          <button id="daily-add">Add daily ping</button>
        </div>
      </section>

      <section class="card card-wide" id="card-scheduled" hidden>
        <h2>Scheduled pings</h2>
        <ul class="sched-list" id="scheduled-list"></ul>
      </section>
    </main>

    <footer>
      <span id="api-base-label"></span>
      <span id="updated"></span>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
