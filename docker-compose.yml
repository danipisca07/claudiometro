services:
  claudiometro:
    build: .
    # Alternatively, after a build/push: image: danipisca07/claudiometro:latest
    container_name: claudiometro
    restart: unless-stopped
    # Explicit DNS: some hosts (e.g. TrueNAS) leave the container without a
    # working resolver, causing ENOTFOUND on api.anthropic.com.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "4317:4317"
    environment:
      PORT: "4317"
      CLAUDE_CONFIG_DIR: /config
      CLAUDIOMETRO_DATA_DIR: /data
      # REQUIRED to enable remote credentials upload.
      # Generate a long, random secret and keep it private.
      CLAUDIOMETRO_ADMIN_TOKEN: "${CLAUDIOMETRO_ADMIN_TOKEN:?a CLAUDIOMETRO_ADMIN_TOKEN is required}"
      # DISABLE_REFRESH: "0"
    volumes:
      # .credentials.json lives here (created via remote push or copied by hand).
      - ./config:/config
      # Persistent scheduled pings.
      - ./data:/data
